name: z Slack Notify

on:
  workflow_dispatch:

jobs:
  notify:
    name: slack nofiy
    runs-on: ubuntu-latest
    steps:
      - name: Slack nofify
        uses: slackapi/slack-github-action@v1.22.0
        with:
          channel-id: C0B7888LR38
          payload: |
            {
              "attachments": [
                {
                  "color": "#0068B7",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "Message Header",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "Hello World :ghost:"
                      }
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{secrets.SLACK_BOT_TOKEN}}
